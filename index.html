<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Рефлексия парақшасы</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        textarea, input { width: 100%; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button { background-color: #5c67f2; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }
        .post { background: #f9f9f9; padding: 15px; margin-top: 15px; border-left: 5px solid #5c67f2; border-radius: 4px; }
        .author { font-weight: bold; color: #5c67f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>Рефлексия</h2>
    <input type="text" id="nameInput" placeholder="Аты-жөніңіз">
    <textarea id="commentInput" placeholder="Ойыңызды жазыңыз..."></textarea>
    <button onclick="saveComment()">Сақтау</button>

    <div id="commentsSection"></div>
</div>

<script>
    // Бет жүктелгенде сақталған пікірлерді шығару
    window.onload = loadComments;

    function saveComment() {
        let name = document.getElementById('nameInput').value;
        let comment = document.getElementById('commentInput').value;
        
        if (name && comment) {
            let newComment = { name: name, text: comment };
            let comments = JSON.parse(localStorage.getItem('myComments') || '[]');
            comments.push(newComment);
            localStorage.setItem('myComments', JSON.stringify(comments));
            
            document.getElementById('commentInput').value = '';
            document.getElementById('nameInput').value = '';
            loadComments(); // Тізімді жаңарту
        }
    }

    function loadComments() {
        let section = document.getElementById('commentsSection');
        section.innerHTML = '';
        let comments = JSON.parse(localStorage.getItem('myComments') || '[]');
        
        comments.reverse().forEach(c => {
            let div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = `<div class="author">${c.name}</div><div>${c.text}</div>`;
            section.appendChild(div);
        });
    }
</script>

</body>
</html>
